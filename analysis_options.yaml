# Static analysis configuration for ipot_mobile.
#
# Built on top of `flutter_lints` and tightened with strict type-checking and
# a few extra rules that catch the kinds of bugs that actually bite us
# (unawaited futures, leaked subscriptions, mixed quote styles, drifted import
# order). Lint rules already enabled by `flutter_lints` are not duplicated here.
include: package:flutter_lints/flutter.yaml

analyzer:
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  errors:
    # freezed/json_serializable emit annotations on members where the analyzer
    # considers them invalid; ignoring this keeps generated code clean once
    # build_runner is wired up in a later commit.
    invalid_annotation_target: ignore
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "build/**"

linter:
  rules:
    - prefer_single_quotes
    - require_trailing_commas
    - avoid_redundant_argument_values
    - unawaited_futures
    - cancel_subscriptions
    - close_sinks
    - directives_ordering
    - sort_constructors_first
    - sort_unnamed_constructors_first
